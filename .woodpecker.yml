when:
  event: push

steps:
  lint-and-test:
    image: python:3.12-slim
    commands:
      - pip install poetry==1.8.4
      - poetry install
      - poetry run ruff check nextcloud_todos
      - poetry run mypy nextcloud_todos
      - poetry run pytest -v
    backend_options:
      kubernetes:
        resources:
          limits:
            memory: 1Gi

  build-and-push:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      registry: forgejo.viktorbarzin.me
      repo: forgejo.viktorbarzin.me/viktor/nextcloud-todos
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      platforms: linux/amd64
      username:
        from_secret: forgejo_user
      password:
        from_secret: forgejo_push_token

  deploy:
    image: bitnami/kubectl
    commands:
      - kubectl set image deployment/nextcloud-todos nextcloud-todos=forgejo.viktorbarzin.me/viktor/nextcloud-todos:${CI_COMMIT_SHA:0:8} alembic-migrate=forgejo.viktorbarzin.me/viktor/nextcloud-todos:${CI_COMMIT_SHA:0:8} -n nextcloud-todos
      - kubectl rollout status deployment/nextcloud-todos -n nextcloud-todos --timeout=300s
